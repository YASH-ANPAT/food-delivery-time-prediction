<!DOCTYPE html>
<html>
<head>
    <title>Delivery Time Predictor</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            text-align: center;
            padding: 40px;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 400px;
            margin: auto;
            box-shadow: 0px 0px 20px rgba(0,0,0,0.2);
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 8px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            background: #4facfe;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 8px;
            width: 95%;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #00c6ff;
        }

        .result {
            margin-top: 20px;
            font-size: 18px;
            color: green;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>🚚 Delivery Time Predictor</h2>

    <form action="/predict" method="post">

        <input type="number" name="f1" placeholder="Age (18-60)" min="18" max="60" required>

        <input type="number" name="f2" placeholder="Rating (1-5)" min="1" max="5" step="0.1" required>

        <input type="text" name="restaurant" placeholder="Restaurant Location" required>

        <input type="text" name="delivery" placeholder="Delivery Location" required>

        <input type="number" name="f7" placeholder="Vehicle Condition (0-2)" min="0" max="2" required>

        <input type="number" name="f8" placeholder="Multiple Deliveries (0-3)" min="0" max="3" required>

        <button type="submit">Predict Delivery Time</button>

    </form>

    <div class="result">
        {{ prediction_text }}
    </div>

</div>

</body>
</html>
